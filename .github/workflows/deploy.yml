name: Test and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GITHUB_MCP_VERSION: "v0.32.0"
  PYTHON_VERSION: "3.14"

jobs:
  # ---------------------------------------------------------------------------
  # test — runs on every PR and push to main
  # GitHub tools are stubbed (SWARMHQ_TEST_MODE=1).
  # Uses the same GCP SA key as deploy → Vertex AI, no free-tier quota limits.
  # ---------------------------------------------------------------------------
  test:
    name: Integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Service Account Key)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (including dev group)
        run: uv sync --group dev

      - name: Run ADK eval tests (mocked GitHub tools)
        env:
          SWARMHQ_TEST_MODE: "1"
          GOOGLE_GENAI_USE_VERTEXAI: "1"
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT }}
          GOOGLE_CLOUD_LOCATION: ${{ secrets.GCP_REGION }}
          SWARMHQ_ORG_OWNER: ${{ secrets.SWARMHQ_ORG_OWNER }}
        run: uv run pytest tests/ -v

  # ---------------------------------------------------------------------------
  # deploy — runs only on push to main after tests pass
  # Downloads real Linux binary; authenticates to GCP via service account key.
  # Cloud SQL session persistence is optional: skipped if CLOUDSQL_CONN_NAME
  # is not configured.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Service Account Key)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Download Linux github-mcp-server binary
        run: |
          curl -fsSL \
            "https://github.com/github/github-mcp-server/releases/download/${{ env.GITHUB_MCP_VERSION }}/github-mcp-server_Linux_x86_64.tar.gz" \
            -o /tmp/github-mcp-server.tar.gz
          tar -xzf /tmp/github-mcp-server.tar.gz -C /tmp github-mcp-server
          mkdir -p swarm_hq_agent/bin
          cp /tmp/github-mcp-server swarm_hq_agent/bin/github-mcp-server
          chmod +x swarm_hq_agent/bin/github-mcp-server

      - name: Deploy to Cloud Run
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT }}
          GOOGLE_CLOUD_LOCATION: ${{ secrets.GCP_REGION }}
          RUNTIME_SA_EMAIL: ${{ secrets.RUNTIME_SA_EMAIL }}
          CLOUDSQL_CONN_NAME: ${{ secrets.CLOUDSQL_CONN_NAME }}
          CLOUDSQL_DB_PASSWORD: ${{ secrets.CLOUDSQL_DB_PASSWORD }}
          SWARMHQ_ORG_OWNER: ${{ secrets.SWARMHQ_ORG_OWNER }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Build optional flags conditionally to avoid passing empty values
          EXTRA_FLAGS=()

          if [[ -n "$RUNTIME_SA_EMAIL" ]]; then
            EXTRA_FLAGS+=(--service-account="$RUNTIME_SA_EMAIL")
          fi

          # Cloud SQL session persistence (optional)
          SESSION_URI_FLAG=()
          if [[ -n "$CLOUDSQL_CONN_NAME" && -n "$CLOUDSQL_DB_PASSWORD" ]]; then
            ADK_SESSION_SERVICE_URI="postgresql+asyncpg://adk:${CLOUDSQL_DB_PASSWORD}@/adk_sessions?host=/cloudsql/${CLOUDSQL_CONN_NAME}"
            SESSION_URI_FLAG+=(--session_service_uri "$ADK_SESSION_SERVICE_URI")
            EXTRA_FLAGS+=(--add-cloudsql-instances="$CLOUDSQL_CONN_NAME")
          fi

          # Secrets to inject into Cloud Run (GH PAT required)
          SET_SECRETS="GITHUB_PERSONAL_ACCESS_TOKEN=GITHUB_PERSONAL_ACCESS_TOKEN:latest"

          uv run adk deploy cloud_run \
            --project "$GOOGLE_CLOUD_PROJECT" \
            --region "$GOOGLE_CLOUD_LOCATION" \
            --service_name "swarmhq" \
            --with_ui \
            --allow_origins "*" \
            "${SESSION_URI_FLAG[@]}" \
            swarm_hq_agent \
            -- \
            --allow-unauthenticated \
            --quiet \
            --concurrency=1 \
            --min-instances=1 \
            --timeout=120 \
            "${EXTRA_FLAGS[@]}" \
            --set-secrets="$SET_SECRETS" \
            --set-env-vars="SWARMHQ_ORG_OWNER=${SWARMHQ_ORG_OWNER},GOOGLE_GENAI_USE_VERTEXAI=true,GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT},GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION}"
